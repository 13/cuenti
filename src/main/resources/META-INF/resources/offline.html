<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Offline</title>
  <style>
    :root{--bg:#f7fafc;--card:#fff;--muted:#6b7280;--accent:#2563eb}
    html,body{height:100%;margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial}
    body{display:flex;align-items:center;justify-content:center;background:var(--bg);color:#111}
    .card{max-width:820px;padding:28px;border-radius:12px;background:var(--card);box-shadow:0 6px 28px rgba(16,24,40,0.06);}
    .logo{display:block;margin:0 auto 12px;max-width:160px;height:auto}
    h1{margin:0 0 8px;font-size:22px}
    p{margin:0 0 18px;color:var(--muted);line-height:1.45}
    .actions{display:flex;gap:10px}
    button{background:var(--accent);color:#fff;border:none;padding:8px 12px;border-radius:8px;font-weight:600;cursor:pointer}
    button.secondary{background:transparent;color:var(--accent);border:1px solid rgba(37,99,235,0.12)}
  </style>
</head>
<body>
  <div class="card" role="main">
    <img class="logo" src="/images/Cuenti.png" alt="Cuenti" />
    <h1 id="offline-title">You are offline</h1>
    <p id="offline-text">Cuenti Homebanking requires an internet connection to work. You do not seem to have access to the server right now. Check your internet connection and try reloading the page to use the application.</p>
    <div class="actions">
      <button id="reload">Reload</button>
      <button class="secondary" id="open-help">Open help</button>
    </div>
  </div>

  <link rel="icon" href="/images/favicon.svg" />

  <script>
    // Simple language selection: if browser language starts with 'de', show German text
    (function(){
      var lang = (navigator.language || navigator.userLanguage || 'en').toLowerCase();
      var title = document.getElementById('offline-title');
      var text = document.getElementById('offline-text');
      if(lang.startsWith('de')){
        title.textContent = 'Sie sind offline';
        text.textContent = 'Cuenti Homebanking benötigt eine Internetverbindung, um zu funktionieren. Sie scheinen derzeit keinen Zugriff auf den Server zu haben. Prüfen Sie Ihre Internetverbindung und laden Sie die Seite neu, um die Anwendung zu verwenden.';
      } else {
        title.textContent = 'You are offline';
        text.textContent = 'Cuenti Homebanking requires an internet connection to work. You do not seem to have access to the server right now. Check your internet connection and try reloading the page to use the application.';
      }
    })();

    document.getElementById('reload').addEventListener('click', function(){
      location.reload(true);
    });
    document.getElementById('open-help').addEventListener('click', function(){
      // When offline the SPA router won't work — open the help page in a new tab where possible
      window.open('/', '_self');
    });
  </script>
</body>
</html>
