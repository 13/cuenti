# Hilfe
help.title=Hilfe
help.dashboard=Das Dashboard bietet einen Ãberblick Ãžber Ihre finanzielle Situation. Es zeigt verfÃžgbares Bargeld von allen Bankkonten, den Portfoliowert von allen VermÃķgenskonten und das GesamtvermÃķgen. Darunter finden Sie eine AufschlÃžsselung Ihrer Konten nach Typ, Cashflow-Trends und die hÃķchsten Ausgabenkategorien.
help.transactions=Alle Transaktionen anzeigen und verwalten. Sie kÃķnnen nach Konto, Datumsbereich, Typ filtern und nach bestimmten Transaktionen suchen. Verwenden Sie die SchaltflÃĪche 'Transaktion hinzufÃžgen', um neue Transaktionen zu erfassen. Klicken Sie auf eine Transaktion, um Details anzuzeigen oder sie zu bearbeiten. Sie kÃķnnen Transaktionen sortieren, indem Sie auf SpaltenÃžberschriften klicken.
help.statistics=Analysieren Sie Ihre Finanzdaten mit detaillierten Diagrammen und Berichten. Zeigen Sie Einnahmen und Ausgaben nach Konto, Kategorie, ZahlungsempfÃĪnger oder Tag an. WÃĪhlen Sie verschiedene ZeitrÃĪume (tÃĪglich, wÃķchentlich, monatlich, jÃĪhrlich oder benutzerdefiniert), um Ihre Ausgabenmuster zu analysieren. Verwenden Sie die Filter, um sich auf bestimmte Aspekte Ihrer Finanzen zu konzentrieren.
help.vehicles=Verfolgen Sie fahrzeugbezogene Ausgaben und Kraftstoffverbrauch. FÃžgen Sie Tanktransaktionen mit dem Memo-Format hinzu: 'd=XXXXXX v~XX.XX (?XX.XX XX.XXL XXXXXXkm)', wobei d= die Gesamtkilometer und v~ die getankten Liter sind. Das System berechnet die Entfernung zwischen TankvorgÃĪngen, den Verbrauch und Gesamtstatistiken.
help.manage_accounts=Erstellen und verwalten Sie Ihre Finanzkonten (Bankkonten, Kreditkarten, VermÃķgenswerte usw.). Sie kÃķnnen Anfangssalden festlegen, Konten nach Typ und Gruppe organisieren und auswÃĪhlen, welche Konten in Zusammenfassungen und Berichten enthalten sein sollen. Jedes Konto verfolgt automatisch seinen aktuellen Saldo basierend auf Transaktionen.
help.payees=Verwalten Sie die Liste der Personen oder Unternehmen, an die Sie Geld zahlen oder von denen Sie Geld erhalten. Sie kÃķnnen jedem ZahlungsempfÃĪnger eine Standardkategorie zuweisen, um die Transaktionseingabe zu beschleunigen. Wenn Sie einen ZahlungsempfÃĪnger in einer Transaktion auswÃĪhlen, wird die Standardkategorie vorausgewÃĪhlt.
help.categories=Organisieren Sie Ihre Einnahmen und Ausgaben in Kategorien. Sie kÃķnnen Hauptkategorien und Unterkategorien fÃžr eine bessere Organisation erstellen. Kategorien helfen Ihnen, Ihre Ausgabenmuster zu analysieren und Budgets zu erstellen. Jede Kategorie wird entweder als Einnahme oder Ausgabe gekennzeichnet.
help.tags=Erstellen Sie Tags, um Ihren Transaktionen zusÃĪtzliche Bezeichnungen hinzuzufÃžgen. Im Gegensatz zu Kategorien kÃķnnen Sie einer einzelnen Transaktion mehrere Tags zuweisen. Verwenden Sie Tags fÃžr Ãžbergreifende Themen wie 'Arbeit', 'Privat', 'Steuerlich absetzbar' usw.
help.currencies=Verwalten Sie WÃĪhrungen und ihre Wechselkurse. Das System unterstÃžtzt mehrere WÃĪhrungen und rechnet BetrÃĪge automatisch fÃžr Berichte um. Sie kÃķnnen Wechselkurse manuell aktualisieren oder sie kÃķnnen automatisch abgerufen werden, wenn dies konfiguriert ist.
help.assets=Verfolgen Sie Investitionen wie Aktien, ETFs und KryptowÃĪhrungen. FÃžgen Sie VermÃķgenswerte mit ihren Symbolen hinzu (z.B. VWCE.DE, AMZN, BTC-EUR) und das System kann aktuelle Preise abrufen. Wenn Sie VermÃķgenswerte Ãžber Transaktionen kaufen, verfolgt das System Mengen und berechnet nicht realisierte Gewinne/Verluste.
help.settings_user=Passen Sie Ihre persÃķnlichen Einstellungen an, einschlieÃlich Sprache, Passwort und Dunkelmodus-Einstellungen. Sie kÃķnnen hier auch Ihr Profil lÃķschen (dies entfernt dauerhaft alle Ihre Daten).
help.settings_import=Importieren Sie Transaktionen aus Bank-CSV-Dateien oder exportieren Sie alle Ihre Daten im JSON-Format. UnterstÃžtzte Formate sind Trade Republic CSV und Homebank XHB-Dateien. Der JSON-Export umfasst alle Ihre Konten, Transaktionen, Kategorien, ZahlungsempfÃĪnger und Einstellungen.

