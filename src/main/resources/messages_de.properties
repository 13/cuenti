# Hilfe
help.title=Hilfe
help.dashboard=Das Dashboard bietet einen Ăśberblick ĂĽber Ihre finanzielle Situation. Es zeigt verfĂĽgbares Bargeld von allen Bankkonten, den Portfoliowert von allen VermĂ¶genskonten und das GesamtvermĂ¶gen. Darunter finden Sie eine AufschlĂĽsselung Ihrer Konten nach Typ, Cashflow-Trends und die hĂ¶chsten Ausgabenkategorien.
help.transactions=Alle Transaktionen anzeigen und verwalten. Sie kĂ¶nnen nach Konto, Datumsbereich, Typ filtern und nach bestimmten Transaktionen suchen. Verwenden Sie die SchaltflĂ¤che 'Transaktion hinzufĂĽgen', um neue Transaktionen zu erfassen. Klicken Sie auf eine Transaktion, um Details anzuzeigen oder sie zu bearbeiten. Sie kĂ¶nnen Transaktionen sortieren, indem Sie auf SpaltenĂĽberschriften klicken.
help.statistics=Analysieren Sie Ihre Finanzdaten mit detaillierten Diagrammen und Berichten. Zeigen Sie Einnahmen und Ausgaben nach Konto, Kategorie, ZahlungsempfĂ¤nger oder Tag an. WĂ¤hlen Sie verschiedene ZeitrĂ¤ume (tĂ¤glich, wĂ¶chentlich, monatlich, jĂ¤hrlich oder benutzerdefiniert), um Ihre Ausgabenmuster zu analysieren. Verwenden Sie die Filter, um sich auf bestimmte Aspekte Ihrer Finanzen zu konzentrieren.
help.vehicles=Verfolgen Sie fahrzeugbezogene Ausgaben und Kraftstoffverbrauch. FĂĽgen Sie Tanktransaktionen mit dem Memo-Format hinzu: 'd=XXXXXX v~XX.XX (?XX.XX XX.XXL XXXXXXkm)', wobei d= die Gesamtkilometer und v~ die getankten Liter sind. Das System berechnet die Entfernung zwischen TankvorgĂ¤ngen, den Verbrauch und Gesamtstatistiken.
help.manage_accounts=Erstellen und verwalten Sie Ihre Finanzkonten (Bankkonten, Kreditkarten, VermĂ¶genswerte usw.). Sie kĂ¶nnen Anfangssalden festlegen, Konten nach Typ und Gruppe organisieren und auswĂ¤hlen, welche Konten in Zusammenfassungen und Berichten enthalten sein sollen. Jedes Konto verfolgt automatisch seinen aktuellen Saldo basierend auf Transaktionen.
help.payees=Verwalten Sie die Liste der Personen oder Unternehmen, an die Sie Geld zahlen oder von denen Sie Geld erhalten. Sie kĂ¶nnen jedem ZahlungsempfĂ¤nger eine Standardkategorie zuweisen, um die Transaktionseingabe zu beschleunigen. Wenn Sie einen ZahlungsempfĂ¤nger in einer Transaktion auswĂ¤hlen, wird die Standardkategorie vorausgewĂ¤hlt.
help.categories=Organisieren Sie Ihre Einnahmen und Ausgaben in Kategorien. Sie kĂ¶nnen Hauptkategorien und Unterkategorien fĂĽr eine bessere Organisation erstellen. Kategorien helfen Ihnen, Ihre Ausgabenmuster zu analysieren und Budgets zu erstellen. Jede Kategorie wird entweder als Einnahme oder Ausgabe gekennzeichnet.
help.tags=Erstellen Sie Tags, um Ihren Transaktionen zusĂ¤tzliche Bezeichnungen hinzuzufĂĽgen. Im Gegensatz zu Kategorien kĂ¶nnen Sie einer einzelnen Transaktion mehrere Tags zuweisen. Verwenden Sie Tags fĂĽr ĂĽbergreifende Themen wie 'Arbeit', 'Privat', 'Steuerlich absetzbar' usw.
help.currencies=Verwalten Sie WĂ¤hrungen und ihre Wechselkurse. Das System unterstĂĽtzt mehrere WĂ¤hrungen und rechnet BetrĂ¤ge automatisch fĂĽr Berichte um. Sie kĂ¶nnen Wechselkurse manuell aktualisieren oder sie kĂ¶nnen automatisch abgerufen werden, wenn dies konfiguriert ist.
help.assets=Verfolgen Sie Investitionen wie Aktien, ETFs und KryptowĂ¤hrungen. FĂĽgen Sie VermĂ¶genswerte mit ihren Symbolen hinzu (z.B. VWCE.DE, AMZN, BTC-EUR) und das System kann aktuelle Preise abrufen. Wenn Sie VermĂ¶genswerte ĂĽber Transaktionen kaufen, verfolgt das System Mengen und berechnet nicht realisierte Gewinne/Verluste.
help.settings_user=Passen Sie Ihre persĂ¶nlichen Einstellungen an, einschlieĂźlich Sprache, Passwort und Dunkelmodus-Einstellungen. Sie kĂ¶nnen hier auch Ihr Profil lĂ¶schen (dies entfernt dauerhaft alle Ihre Daten).
help.settings_import=Importieren Sie Transaktionen aus Bank-CSV-Dateien oder exportieren Sie alle Ihre Daten im JSON-Format. UnterstĂĽtzte Formate sind Trade Republic CSV und Homebank XHB-Dateien. Der JSON-Export umfasst alle Ihre Konten, Transaktionen, Kategorien, ZahlungsempfĂ¤nger und Einstellungen.

