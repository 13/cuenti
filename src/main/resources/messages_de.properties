# Hilfe
help.title=Hilfe
help.dashboard=Das Dashboard bietet einen Ãberblick Ãỳber Ihre finanzielle Situation. Es zeigt verfÃỳgbares Bargeld von allen Bankkonten, den Portfoliowert von allen VermÃ¶genskonten und das GesamtvermÃ¶gen. Darunter finden Sie eine AufschlÃỳsselung Ihrer Konten nach Typ, Cashflow-Trends und die hÃ¶chsten Ausgabenkategorien.
help.transactions=Alle Transaktionen anzeigen und verwalten. Sie kÃ¶nnen nach Konto, Datumsbereich, Typ filtern und nach bestimmten Transaktionen suchen. Verwenden Sie die SchaltflÃĊche 'Transaktion hinzufÃỳgen', um neue Transaktionen zu erfassen. Klicken Sie auf eine Transaktion, um Details anzuzeigen oder sie zu bearbeiten. Sie kÃ¶nnen Transaktionen sortieren, indem Sie auf SpaltenÃỳberschriften klicken.
help.statistics=Analysieren Sie Ihre Finanzdaten mit detaillierten Diagrammen und Berichten. Zeigen Sie Einnahmen und Ausgaben nach Konto, Kategorie, ZahlungsempfÃĊnger oder Tag an. WÃĊhlen Sie verschiedene ZeitrÃĊume (tÃĊglich, wÃ¶chentlich, monatlich, jÃĊhrlich oder benutzerdefiniert), um Ihre Ausgabenmuster zu analysieren. Verwenden Sie die Filter, um sich auf bestimmte Aspekte Ihrer Finanzen zu konzentrieren.
help.vehicles=Verfolgen Sie fahrzeugbezogene Ausgaben und Kraftstoffverbrauch. FÃỳgen Sie Tanktransaktionen mit dem Memo-Format hinzu: 'd=XXXXXX v~XX.XX (?XX.XX XX.XXL XXXXXXkm)', wobei d= die Gesamtkilometer und v~ die getankten Liter sind. Das System berechnet die Entfernung zwischen TankvorgÃĊngen, den Verbrauch und Gesamtstatistiken.
help.manage_accounts=Erstellen und verwalten Sie Ihre Finanzkonten (Bankkonten, Kreditkarten, VermÃ¶genswerte usw.). Sie kÃ¶nnen Anfangssalden festlegen, Konten nach Typ und Gruppe organisieren und auswÃĊhlen, welche Konten in Zusammenfassungen und Berichten enthalten sein sollen. Jedes Konto verfolgt automatisch seinen aktuellen Saldo basierend auf Transaktionen.
help.payees=Verwalten Sie die Liste der Personen oder Unternehmen, an die Sie Geld zahlen oder von denen Sie Geld erhalten. Sie kÃ¶nnen jedem ZahlungsempfÃĊnger eine Standardkategorie zuweisen, um die Transaktionseingabe zu beschleunigen. Wenn Sie einen ZahlungsempfÃĊnger in einer Transaktion auswÃĊhlen, wird die Standardkategorie vorausgewÃĊhlt.
help.categories=Organisieren Sie Ihre Einnahmen und Ausgaben in Kategorien. Sie kÃ¶nnen Hauptkategorien und Unterkategorien fÃỳr eine bessere Organisation erstellen. Kategorien helfen Ihnen, Ihre Ausgabenmuster zu analysieren und Budgets zu erstellen. Jede Kategorie wird entweder als Einnahme oder Ausgabe gekennzeichnet.
help.tags=Erstellen Sie Tags, um Ihren Transaktionen zusÃĊtzliche Bezeichnungen hinzuzufÃỳgen. Im Gegensatz zu Kategorien kÃ¶nnen Sie einer einzelnen Transaktion mehrere Tags zuweisen. Verwenden Sie Tags fÃỳr Ãỳbergreifende Themen wie 'Arbeit', 'Privat', 'Steuerlich absetzbar' usw.
help.currencies=Verwalten Sie WÃĊhrungen und ihre Wechselkurse. Das System unterstÃỳtzt mehrere WÃĊhrungen und rechnet BetrÃĊge automatisch fÃỳr Berichte um. Sie kÃ¶nnen Wechselkurse manuell aktualisieren oder sie kÃ¶nnen automatisch abgerufen werden, wenn dies konfiguriert ist.
help.assets=Verfolgen Sie Investitionen wie Aktien, ETFs und KryptowÃĊhrungen. FÃỳgen Sie VermÃ¶genswerte mit ihren Symbolen hinzu (z.B. VWCE.DE, AMZN, BTC-EUR) und das System kann aktuelle Preise abrufen. Wenn Sie VermÃ¶genswerte Ãỳber Transaktionen kaufen, verfolgt das System Mengen und berechnet nicht realisierte Gewinne/Verluste.
help.settings_user=Passen Sie Ihre persÃ¶nlichen Einstellungen an, einschlieÃlich Sprache, Passwort und Dunkelmodus-Einstellungen. Sie kÃ¶nnen hier auch Ihr Profil lÃ¶schen (dies entfernt dauerhaft alle Ihre Daten).
help.settings_import=Importieren Sie Transaktionen aus Bank-CSV-Dateien oder exportieren Sie alle Ihre Daten im JSON-Format. UnterstÃỳtzte Formate sind Trade Republic CSV und Homebank XHB-Dateien. Der JSON-Export umfasst alle Ihre Konten, Transaktionen, Kategorien, ZahlungsempfÃĊnger und Einstellungen.

