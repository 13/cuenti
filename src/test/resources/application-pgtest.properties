# Profile for the Testcontainers PostgreSQL integration test.
# Datasource comes from the container via @ServiceConnection.
spring.application.name=Cuenti
spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false
spring.jpa.show-sql=false
vaadin.productionMode=false
jwt.secret=cuenti-test-secret-key-change-this-must-be-at-least-256-bits-long
jwt.expiration=86400000
logging.level.com.cuenti.app=WARN
